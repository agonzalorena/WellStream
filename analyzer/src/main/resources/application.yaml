server:
  port: 8082
spring:
  application:
    name: analyzer

  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: telemetry-analyzer-group
      #Empieza a leer desde el último mensaje disponible en el topic
      auto-offset-reset: latest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      # Deserializador para convertir el JSON recibido en objetos Java
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.type.mapping: "sensor-dto:com.agonzalorena.msvc.analyzer.presentation.dto.SensorDTO"
        spring.json.trusted.packages: "*"

  datasource:
    url: jdbc:postgresql://localhost:5432/upstream_db
    username: user_admin
    password: 1234
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate.ddl-auto: update #Crea o actualiza las tablas según las entidades definidas
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        default_batch_fetch_size: 50 #Configura el tamaño del lote para la recuperación de datos, mejorando el rendimiento(n+1 problem)
    logging:
        level:
          org.hibernate.SQL: DEBUG
  output:
    ansi:
        enabled: always #Logs de hibernate con colores