server:
  port: 8082
spring:
  application:
    name: analyzer

  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: telemetry-analyzer-group
      #Empieza a leer desde el último mensaje disponible en el topic
      auto-offset-reset: latest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.ByteArrayDeserializer
      #Esto sirve para cuando se usa JsonDeserializer, pero como usamos ByteArrayDeserializer, no es necesario
      #properties:
      #  spring.json.type.mapping: "sensor-dto:com.agonzalorena.msvc.analyzer.presentation.dto.SensorDTO"
      #  spring.json.trusted.packages: "*"
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.ByteArraySerializer

  datasource:
    url: jdbc:postgresql://localhost:5432/upstream_db
    username: user_admin
    password: 1234
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate.ddl-auto: update #Crea o actualiza las tablas según las entidades definidas
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        default_batch_fetch_size: 50 #Configura el tamaño del lote para la recuperación de datos, mejorando el rendimiento(n+1 problem)
    logging:
        level:
          org.hibernate.SQL: DEBUG
  output:
    ansi:
        enabled: always #Logs de hibernate con colores

# App Configuration
app:
  limits:
    pressure:
      max: 4000.0
      min: 250.0
    temperature:
      max: 85.0
      min: 25.0
    flow-rate:
      max: 3500.0
      min: 600.0
    hysteresis-margin: 6.0